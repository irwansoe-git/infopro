        // RENDERING KATALOG KE HALAMAN WEB
        function tampilkanKatalog(properti) {
            const listContainer = document.getElementById('property-list');
            const selectEl = document.getElementById('form-properti-pilihan');

            selectEl.innerHTML = '<option value="Umum">Tanya Umum / Belum Memilih Unit</option>';

                // Buat HTML untuk deretan 5 gambar pendukung

                        </div>
                    `;

        // FUNGSI KETIKA GAMBAR PENDUKUNG DI-HOVER (DISENTUH)

        // FUNGSI KETIKA GAMBAR UTAMA DIKLIK (AKAN MEMPERBESAR GAMBAR YANG SEDANG AKTIF TAMPIL)

            openLightbox(srcAktif);
        }

        // BACA SELENGKAPNYA
        function toggleDeskripsi(id) {
            const shortText = document.getElementById(`desc-short-${id}`);
            const fullText = document.getElementById(`desc-full-${id}`);
            const btn = document.getElementById(`btn-read-${id}`);
            if (fullText.classList.contains('hidden')) {
                fullText.classList.remove('hidden'); shortText.classList.add('hidden');
                btn.innerHTML = 'Sembunyikan <i class="fa-solid fa-chevron-up text-[12px]"></i>';
            } else {
                fullText.classList.add('hidden'); shortText.classList.remove('hidden');
                btn.innerHTML = 'Selengkapnya <i class="fa-solid fa-chevron-down text-[12px]"></i>';
            }
        }

        // FILTERING
        function filterProperti(kategori) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.className = "filter-btn bg-white hover:bg-gray-100 text-gray-700 font-medium px-5 py-2 rounded-full border border-gray-200 transition cursor-pointer");
            event.target.className = "filter-btn bg-blue-600 text-white font-medium px-5 py-2 rounded-full shadow transition cursor-pointer";
            if (kategori === 'semua') { tampilkanKatalog(daftarProperti); }
            else { tampilkanKatalog(daftarProperti.filter(item => item.tipe === kategori)); }
        }

        // LIGHTBOX FUNCTIONS
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu.classList.contains('hidden')) menu.classList.remove('hidden');
            else menu.classList.add('hidden');
        }
        function setPropertiPilihan(judul) { document.getElementById('form-properti-pilihan').value = judul; }

        function kirimFormKeWhatsApp(event) {
            event.preventDefault();
            const nama = document.getElementById('form-nama').value;
            const unit = document.getElementById('form-properti-pilihan').value;
            const pesan = document.getElementById('form-pesan').value;
            const text = `Halo, saya mengisi form di web.%0A%0A*Nama:* ${nama}%0A*Unit:* ${unit}%0A*Pesan:* ${pesan}`;
            window.open(`https://wa.me/6285196447071?text=${text}`, '_blank');
