<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Properti Premium - Agen Properti Mandiri</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .lightbox { display: none; }
        .lightbox:target { display: flex; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center relative">
            <a href="#" class="text-xl font-bold text-blue-600 flex items-center gap-2">
                <i class="fa-solid fa-house-chimney"></i> AgenProperti
            </a>
            <div class="hidden md:flex gap-6 font-medium">
                <a href="#katalog" class="hover:text-blue-600 transition">Katalog Properti</a>
                <a href="#video" class="hover:text-blue-600 transition">Tur Video</a>
                <a href="#hubungi" class="hover:text-blue-600 transition">Hubungi Kami</a>
            </div>
            <button onclick="toggleMenu()" class="md:hidden text-gray-600 focus:outline-none p-2 text-2xl cursor-pointer">
                <i id="menu-icon" class="fa-solid fa-bars"></i>
            </button>
            <div id="mobile-menu" class="hidden absolute top-full left-0 right-0 bg-white shadow-lg flex-col border-t border-gray-100 md:hidden">
                <a href="#katalog" onclick="toggleMenu()" class="px-6 py-3 border-b border-gray-50 hover:bg-gray-50 text-gray-700 font-medium">Katalog Properti</a>
                <a href="#video" onclick="toggleMenu()" class="px-6 py-3 border-b border-gray-50 hover:bg-gray-50 text-gray-700 font-medium">Tur Video</a>
                <a href="#hubungi" onclick="toggleMenu()" class="px-6 py-3 hover:bg-gray-50 text-gray-700 font-medium">Hubungi Kami</a>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-blue-800 to-blue-600 text-white py-12 px-4 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-4 leading-tight">Katalog Properti Terpercaya</h1>
            <p class="text-base md:text-xl opacity-95">Klik pada gambar utama maupun gambar pendukung untuk memperbesar foto ruangan.</p>
        </div>
    </header>

    <section id="katalog" class="max-w-6xl mx-auto px-4 py-16">
        <div class="flex flex-wrap justify-center gap-2 mb-10">
            <button onclick="filterProperti('semua')" class="filter-btn bg-blue-600 text-white font-medium px-5 py-2 rounded-full shadow transition cursor-pointer">Semua</button>
            <button onclick="filterProperti('rumah')" class="filter-btn bg-white hover:bg-gray-100 text-gray-700 font-medium px-5 py-2 rounded-full border border-gray-200 transition cursor-pointer">Rumah</button>
            <button onclick="filterProperti('apartemen')" class="filter-btn bg-white hover:bg-gray-100 text-gray-700 font-medium px-5 py-2 rounded-full border border-gray-200 transition cursor-pointer">Apartemen</button>
        </div>

        <div id="property-list" class="space-y-12">
            </div>
    </section>

    <section id="video" class="bg-gray-100 py-12 px-4 text-center">
        <h2 class="text-2xl font-bold mb-6">Virtual Video Tour</h2>
        <div class="max-w-3xl mx-auto relative pb-[56.25%] h-0 rounded-xl overflow-hidden shadow-lg bg-black">
            <iframe class="absolute top-0 left-0 w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>

    <section id="hubungi" class="max-w-3xl mx-auto px-4 py-16">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h3 class="text-2xl font-bold mb-6 text-center">Formulir Pertanyaan & Survei</h3>
            <form onsubmit="kirimFormKeWhatsapp(event)">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Nama Anda</label>
                    <input type="text" id="form-nama" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Unit Properti</label>
                    <select id="form-properti-pilihan" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Pesan</label>
                    <textarea id="form-pesan" required rows="4" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg cursor-pointer">Kirim ke WhatsApp</button>
            </form>
        </div>
    </section>

    <div id="lightbox" class="lightbox fixed inset-0 bg-black/90 z-50 justify-center items-center p-4" onclick="closeLightbox()">
        <span class="absolute top-4 right-6 text-white text-4xl font-bold cursor-pointer">&times;</span>
        <img id="lightbox-img" src="" class="max-w-full max-h-[90vh] rounded shadow-2xl object-contain">
    </div>

    <script>
        // DATA PROPERTI DENGAN FORMAT STRUKTUR GAMBAR YANG MUDAH
        const daftarProperti = [
            { 
                id: 1, 
                tipe: 'rumah', 
                status: 'dijual', 
                judul: 'Cluster Modern Klasik - Pondok Indah', 
                harga: 'Rp 2.500.000.000', 
                spek: '4 KT | 3 KM | 150m²', 
                alamat: 'Jl. Metro Pondok Indah No.12, Jakarta Selatan',
                deskripsi: 'Lokasi super strategis, keamanan 24 jam ketat menggunakan sistem satu gerbang. Dekat dengan mall dan sekolah internasional.',
                // Masukkan Link Google Drive Anda yang sudah diubah ke rumus sakti (=s800) di sini
                imgUtama: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80',
                // Masukkan 5 atau lebih gambar pendukung di dalam baris array ini
                gambarPendukung: [
                    'images/atlanta/atlantakt1.jpg', // Contoh Foto Kamar
                    'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=500&q=80', // Contoh Foto Mandi
                    'https://images.unsplash.com/photo-1556911220-e15b29be8c8f?auto=format&fit=crop&w=500&q=80', // Contoh Foto Dapur
                    'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=500&q=80', // Contoh Foto Balkon
                    'https://images.unsplash.com/photo-1576013551627-0cc20b96c2a7?auto=format&fit=crop&w=500&q=80'  // Contoh Foto Kolam Renang
                ]
            },
            { 
                id: 2, 
                tipe: 'apartemen', 
                status: 'disewakan', 
                judul: 'Studio Executive Bassura City - Unit 1', 
                harga: 'Rp 3.500.000 / Bln', 
                spek: '1 KT | 1 KM | Studio', 
                alamat: 'Tower A Lantai 12, Jakarta Timur',
                deskripsi: 'Kondisi full furnished rapi, siap huni langsung bawa baju. Sudah termasuk AC, Smart TV, kulkas, dan kitchen set.',
                imgUtama: 'https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=800&q=80',
                gambarPendukung: [
                    'https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=500&q=80',
                    'https://images.unsplash.com/photo-1560185893-a55cbc2c78a9?auto=format&fit=crop&w=500&q=80',
                    'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=500&q=80',
                    'https://images.unsplash.com/photo-1564507592333-c60657eea523?auto=format&fit=crop&w=500&q=80',
                    'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=500&q=80'
                ]
            }
        ];

        // RENDERING KATALOG KE HALAMAN WEB
        function tampilkanKatalog(properti) {
            const listContainer = document.getElementById('property-list');
            const selectEl = document.getElementById('form-properti-pilihan');
            
            listContainer.innerHTML = '';
            selectEl.innerHTML = '<option value="Umum">Tanya Umum / Belum Memilih Unit</option>';
            
            properti.forEach(item => {
                // Daftarkan ke select form
                const opt = document.createElement('option');
                opt.value = item.judul;
                opt.innerHTML = `[${item.tipe.toUpperCase()}] ${item.judul}`;
                selectEl.appendChild(opt);

                // Buat HTML untuk deretan 5 gambar pendukung
                let htmlThumbs = '';
                item.gambarPendukung.forEach(urlFoto => {
                    htmlThumbs += `
                        <div class="relative group aspect-video overflow-hidden rounded-lg border border-gray-200 shadow-xs">
                            <img src="${urlFoto}" 
                                 class="w-full h-full object-cover cursor-zoom-in hover:scale-105 transition duration-300" 
                                 onmouseover="gantiPreview(${item.id}, '${urlFoto}')"
                                 onclick="openLightbox('${urlFoto}')" 
                                 alt="Pendukung">
                        </div>
                    `;
                });

                // Susun Tampilan Baris Properti ala Rumah123 (Lebih Melebar & Mewah)
                const card = `
                    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 hover:shadow-xl transition duration-300">
                        
                        <div class="lg:col-span-6 flex flex-col gap-3">
                            <div class="relative h-64 md:h-80 w-full overflow-hidden rounded-xl border border-gray-100 bg-gray-50">
                                <img id="cover-${item.id}" src="${item.imgUtama}" class="w-full h-full object-cover cursor-zoom-in" onclick="bukaLightboxUtama(${item.id})" alt="Utama">
                                <span class="absolute top-3 left-3 bg-blue-600 text-white text-[10px] font-bold px-2.5 py-1 rounded uppercase tracking-wider shadow">${item.tipe}</span>
                                <span class="absolute top-3 right-3 bg-orange-500 text-white text-[10px] font-bold px-2.5 py-1 rounded uppercase tracking-wider shadow">${item.status}</span>
                            </div>
                            
                            <div class="grid grid-cols-5 gap-2">
                                ${htmlThumbs}
                            </div>
                        </div>
                        
                        <div class="lg:col-span-6 flex flex-col justify-between">
                            <div>
                                <h3 class="font-extrabold text-xl md:text-2xl text-gray-900 mb-1 leading-tight">${item.judul}</h3>
                                <p class="text-blue-600 font-black text-2xl mb-1">${item.harga}</p>
                                <p class="text-gray-400 text-xs mb-4 flex items-center gap-1"><i class="fa-solid fa-location-dot text-red-500"></i> ${item.alamat}</p>
                                
                                <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 mb-4">
                                    <p class="text-[11px] font-bold uppercase tracking-wider text-gray-400 mb-1">Spesifikasi Unit:</p>
                                    <p class="text-sm font-semibold text-gray-700"><i class="fa-solid fa-bed text-blue-500 mr-1"></i> ${item.spek}</p>
                                </div>

                                <div class="pt-2">
                                    <p id="desc-short-${item.id}" class="text-gray-600 text-xs leading-relaxed line-clamp-3">${item.deskripsi}</p>
                                    <p id="desc-full-${item.id}" class="hidden text-gray-600 text-xs leading-relaxed bg-blue-50/40 p-3 rounded-lg border border-blue-100/50">${item.deskripsi}</p>
                                    <button id="btn-read-${item.id}" onclick="toggleDeskripsi(${item.id})" class="text-blue-600 hover:text-blue-800 font-bold text-xs mt-1 cursor-pointer inline-block">Baca Selengkapnya <i class="fa-solid fa-chevron-down text-[9px]"></i></button>
                                </div>
                            </div>

                            <div class="mt-6 pt-4 border-t border-gray-100 flex gap-3">
                                <a href="#hubungi" onclick="setPropertiPilihan('${item.judul}')" class="flex-1 text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-xs text-sm">Tanyakan Detail Unit</a>
                            </div>
                        </div>

                    </div>
                `;
                listContainer.innerHTML += card;
            });
        }

        // FUNGSI KETIKA GAMBAR PENDUKUNG DI-HOVER (DISENTUH)
        function gantiPreview(id, urlBaru) {
            document.getElementById(`cover-${id}`).src = urlBaru;
        }

        // FUNGSI KETIKA GAMBAR UTAMA DIKLIK (AKAN MEMPERBESAR GAMBAR YANG SEDANG AKTIF TAMPIL)
        function bukaLightboxUtama(id) {
            const srcAktif = document.getElementById(`cover-${id}`).src;
            openLightbox(srcAktif);
        }

        // BACA SELENGKAPNYA
        function toggleDeskripsi(id) {
            const shortText = document.getElementById(`desc-short-${id}`);
            const fullText = document.getElementById(`desc-full-${id}`);
            const btn = document.getElementById(`btn-read-${id}`);
            if (fullText.classList.contains('hidden')) {
                fullText.classList.remove('hidden'); shortText.classList.add('hidden');
                btn.innerHTML = 'Sembunyikan <i class="fa-solid fa-chevron-up text-[9px]"></i>';
            } else {
                fullText.classList.add('hidden'); shortText.classList.remove('hidden');
                btn.innerHTML = 'Baca Selengkapnya <i class="fa-solid fa-chevron-down text-[9px]"></i>';
            }
        }

        // FILTERING
        function filterProperti(kategori) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.className = "filter-btn bg-white hover:bg-gray-100 text-gray-700 font-medium px-5 py-2 rounded-full border border-gray-200 transition cursor-pointer");
            event.target.className = "filter-btn bg-blue-600 text-white font-medium px-5 py-2 rounded-full shadow transition cursor-pointer";
            if (kategori === 'semua') { tampilkanKatalog(daftarProperti); }
            else { tampilkanKatalog(daftarProperti.filter(item => item.tipe === kategori)); }
        }

        // LIGHTBOX FUNCTIONS
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu.classList.contains('hidden')) menu.classList.remove('hidden');
            else menu.classList.add('hidden');
        }
        function setPropertiPilihan(judul) { document.getElementById('form-properti-pilihan').value = judul; }

        function kirimFormKeWhatsApp(event) {
            event.preventDefault();
            const nama = document.getElementById('form-nama').value;
            const unit = document.getElementById('form-properti-pilihan').value;
            const pesan = document.getElementById('form-pesan').value;
            const text = `Halo, saya mengisi form di web.%0A%0A*Nama:* ${nama}%0A*Unit:* ${unit}%0A*Pesan:* ${pesan}`;
            window.open(`https://wa.me/628123456789?text=${text}`, '_blank');
        }

        // Jalankan katalog
        tampilkanKatalog(daftarProperti);
    </script>
</body>
</html>
